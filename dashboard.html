<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mogli Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarina&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color: #000000;
            --sidebar-bg: #121212;
            --text-color: #ffffff;
            --secondary-text: #a0a0a0;
            --accent-color: #333333;
            --border-color: #222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .logo-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-img {
            height: 50px;
            object-fit: contain;
        }

        .sidebar-toggle {
            width: 20px;
            height: 20px;
            opacity: 0.6;
            cursor: pointer;
        }

        .workspace-selector {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            cursor: pointer;
        }

        .ws-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        .ws-icon {
            width: 20px;
            height: 20px;
        }

        .nav-section {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 25px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--secondary-text);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item:hover,
        .nav-item.active {
            background-color: #1e1e1e;
            color: #fff;
        }

        .nav-icon {
            width: 18px;
            height: 18px;
            object-fit: contain;
            opacity: 0.7;
        }

        .nav-item:hover .nav-icon,
        .nav-item.active .nav-icon {
            opacity: 1;
        }

        .section-label {
            font-size: 11px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 15px;
            padding-left: 12px;
        }

        .divider {
            height: 1px;
            background-color: #222;
            margin: 10px 0 25px 0;
        }

        .sign-out-btn {
            margin-top: auto;
            width: 10%;
            cursor: pointer;
            padding-bottom: 10px;
        }

        .sign-out-img {
            width: 35px;
            object-fit: contain;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 30px 50px;
        }

        .top-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 40px;
            gap: 15px;
        }

        .credits-pill {
            background: linear-gradient(90deg, #FFFFFF 0%, #AEAEAE 47.6%, #FFFFFF 94.23%);
            padding: 6px 14px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 700;
            color: black;
        }

        .credits-icon {
            width: 18px;
            height: 18px;
        }

        .profile-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(90deg, #FFFFFF 0%, #AEAEAE 47.6%, #FFFFFF 94.23%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: black;
            font-size: 14px;
        }

        /* Hero Section */
        .hero-title {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        /* Tool Cards */
        .tools-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .tool-card {
            display: block;
            text-decoration: none;
            transition: transform 0.2s, filter 0.2s;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
        }

        .tool-card:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Removed colored card styles as images are self-contained */


        .tool-icon {
            height: 42px;
            /* Adjusted size */
            width: auto;
            object-fit: contain;
            display: block;
        }

        /* Tool name removed */

        /* Projects Section */
        .section-header {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .projects-container {
            margin-bottom: 50px;
        }

        .empty-project-card {
            width: 100%;
            /* Wider as per image */
            max-width: 320px;
            height: 200px;
            border: 1px dashed #444;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .empty-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .empty-text {
            font-size: 14px;
            color: #fff;
            font-weight: 500;
        }

        .new-badge {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #aaa;
        }

        /* Recent Creations */
        .recent-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-pill {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #333;
            color: #888;
            background: transparent;
        }

        .filter-pill.active {
            background-color: #ccc;
            color: #000;
            border-color: #ccc;
            font-weight: 500;
        }

        .recent-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            grid-auto-rows: 100px;
        }

        .grid-item {
            background-color: #1a1a1a;
            border-radius: 12px;
            transition: background-color 0.2s;
        }

        .grid-item:hover {
            background-color: #222;
        }

        .grid-item.wide {
            grid-column: span 2;
        }

        .grid-item.v-tall {
            grid-row: span 3;
        }

        .grid-item.tall {
            grid-row: span 2;
        }

        .grid-item.large {
            grid-column: span 2;
            grid-row: span 2;
        }

        .no-creations {
            color: var(--secondary-text);
            font-size: 14px;
            font-weight: 400;
            padding: 20px 0;
        }


        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="logo-area">
            <img src="assets-lg/Mogli logo name.png" alt="Mogli" class="logo-img">
            <img src="assets-lg/sidebar.png" class="sidebar-toggle">
        </div>

        <div class="workspace-selector">
            <div class="ws-left">
                <img src="assets-lg/personal.png" class="ws-icon">
                <span>Personal</span>
            </div>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </div>

        <div class="nav-section">
            <a href="dashboard.html" class="nav-item active">
                <img src="assets-lg/home 1.png" class="nav-icon">
                <span>Home</span>
            </a>
            <a href="/history" class="nav-item">
                <img src="assets-lg/history 1.png" class="nav-icon">
                <span>History</span>
            </a>
            <a href="/projects" class="nav-item">
                <img src="assets-lg/folder (3).png" class="nav-icon">
                <span>Projects</span>
            </a>
        </div>

        <div class="divider"></div>

        <div class="section-label">Tools</div>
        <div class="nav-section">
            <a href="/spaces" class="nav-item">
                <img src="assets-lg/nodes.png" class="nav-icon">
                <span>Spaces</span>
            </a>
            <a href="/ng.html?mode=general" class="nav-item">
                <img src="assets-lg/assistant.png" class="nav-icon">
                <span>Assistant</span>
            </a>
            <a href="/lg.html?mode=logo" class="nav-item">
                <img src="assets-lg/generative-image 1.png" class="nav-icon">
                <span>Logo Generator</span>
            </a>
            <div class="nav-item">
                <!-- Using grid icon SVG for All Tools as fallback or similar -->
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span>All Tools</span>
            </div>
        </div>

        <div class="sign-out-btn">
            <img src="assets-lg/sign out.png" class="sign-out-img">
        </div>
    </div>

    <div class="main-content">
        <div class="top-header">
            <div class="credits-pill">
                <img src="assets-lg/banana 1.png" class="credits-icon">
                <span>150</span>
            </div>
            <div class="profile-icon">Y</div>
        </div>

        <div class="hero-title">What would you like to create today ?</div>

        <div class="tools-grid">
            <a href="/lg.html?mode=logo" class="tool-card">
                <img src="assets-lg/logo generator.png" class="tool-icon">
            </a>
            <a href="/ng.html?mode=name" class="tool-card">
                <img src="assets-lg/name generator.png" class="tool-icon">
            </a>
            <a href="/ng.html?mode=summarize" class="tool-card">
                <img src="assets-lg/text summarizer (1).png" class="tool-icon">
            </a>
            <a href="/ng.html?mode=email" class="tool-card">
                <img src="assets-lg/email writing.png" class="tool-icon">
            </a>
            <a href="/ng.html?mode=product" class="tool-card">
                <img src="assets-lg/product writer.png" class="tool-icon">
            </a>
            <a href="/lg.html?mode=poster" class="tool-card">
                <img src="assets-lg/post generator.png" class="tool-icon">
            </a>
        </div>

        <div class="section-header">Projects</div>
        <div class="projects-container">
            <div class="empty-project-card">
                <img src="assets-lg/project error bg image.png" class="empty-img">
                <div class="empty-text">No Projects found</div>
                <div class="new-badge">+ New</div>
            </div>
        </div>

        <div class="section-header">Recent creations</div>
        <div class="recent-filters">
            <div class="filter-pill active">All</div>
            <div class="filter-pill">Images</div>
            <div class="filter-pill">Text</div>
            <div class="filter-pill">Others</div>
        </div>

        <div class="recent-grid">
            <div class="no-creations">No creations yet</div>
        </div>
    </div>
    <script>
        // Persistent Credits
        const credits = localStorage.getItem('mogli_credits') || 150;
        document.getElementById('credit-count').innerText = credits;

        document.querySelectorAll('.sign-out-btn').forEach(btn => {
            btn.onclick = () => {
                window.location.href = 'index.html';
            };
        });
    </script>
</body>

</html>
