<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mogli - History</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarina&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color: #000000;
            --sidebar-bg: #121212;
            --text-color: #ffffff;
            --secondary-text: #a0a0a0;
            --accent-color: #333333;
            --border-color: #222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .logo-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-img {
            height: 50px;
            /* Sync with dashboard */
            object-fit: contain;
        }

        .sidebar-toggle {
            width: 20px;
            height: 20px;
            opacity: 0.6;
            cursor: pointer;
        }

        .workspace-selector {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            cursor: pointer;
        }

        .ws-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        .ws-icon {
            width: 20px;
            height: 20px;
        }

        .nav-section {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 25px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--secondary-text);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item:hover,
        .nav-item.active {
            background-color: #1e1e1e;
            color: #fff;
        }

        .nav-icon {
            width: 18px;
            height: 18px;
            object-fit: contain;
            opacity: 0.7;
        }

        .nav-item:hover .nav-icon,
        .nav-item.active .nav-icon {
            opacity: 1;
        }

        .section-label {
            font-size: 11px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 15px;
            padding-left: 12px;
        }

        .divider {
            height: 1px;
            background-color: #222;
            margin: 10px 0 25px 0;
        }

        .sign-out-btn {
            margin-top: auto;
            width: 10%;
            cursor: pointer;
            padding-bottom: 10px;
        }

        .sign-out-img {
            width: 35px;
            object-fit: contain;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .top-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 30px 50px;
            gap: 15px;
        }

        .credits-pill {
            background: linear-gradient(90deg, #FFFFFF 0%, #AEAEAE 47.6%, #FFFFFF 94.23%);
            padding: 6px 14px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 700;
            color: black;
        }

        .credits-icon {
            width: 18px;
            height: 18px;
        }

        .profile-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(90deg, #FFFFFF 0%, #AEAEAE 47.6%, #FFFFFF 94.23%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: black;
            font-size: 14px;
        }

        /* Empty State */
        .empty-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: -50px;
        }

        .empty-img {
            width: 220px;
            /* Reduced size */
            max-width: 80%;
            object-fit: contain;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .empty-title {
            font-size: 32px;
            /* Smaller text */
            font-weight: 500;
            color: #444;
            /* Sidebar label color style */
            text-align: center;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="logo-area">
            <img src="assets-lg/Mogli logo name.png" alt="Mogli" class="logo-img">
            <img src="assets-lg/sidebar.png" class="sidebar-toggle">
        </div>

        <div class="workspace-selector">
            <div class="ws-left">
                <img src="assets-lg/personal.png" class="ws-icon">
                <span>Personal</span>
            </div>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </div>

        <div class="nav-section">
            <a href="dashboard.html" class="nav-item">
                <img src="assets-lg/home 1.png" class="nav-icon">
                <span>Home</span>
            </a>
            <a href="/history" class="nav-item active">
                <img src="assets-lg/history 1.png" class="nav-icon">
                <span>History</span>
            </a>
            <a href="/projects" class="nav-item">
                <img src="assets-lg/folder (3).png" class="nav-icon">
                <span>Projects</span>
            </a>
        </div>

        <div class="divider"></div>

        <div class="section-label">Tools</div>
        <div class="nav-section">
            <a href="/spaces" class="nav-item">
                <img src="assets-lg/nodes.png" class="nav-icon">
                <span>Spaces</span>
            </a>
            <a href="/ng.html?mode=general" class="nav-item">
                <img src="assets-lg/assistant.png" class="nav-icon">
                <span>Assistant</span>
            </a>
            <a href="/lg.html?mode=logo" class="nav-item">
                <img src="assets-lg/generative-image 1.png" class="nav-icon">
                <span>Logo Generator</span>
            </a>
            <div class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span>All Tools</span>
            </div>
        </div>

        <div class="sign-out-btn">
            <img src="assets-lg/sign out.png" class="sign-out-img">
        </div>
    </div>

    <div class="main-content">
        <div class="top-header">
            <div class="credits-pill">
                <img src="assets-lg/banana 1.png" class="credits-icon">
                <span>150</span>
            </div>
            <div class="profile-icon">Y</div>
        </div>

        <div class="empty-container">
            <img src="assets-lg/project error bg image.png" class="empty-img">
            <h1 class="empty-title">Nothing has been created yet</h1>
        </div>
    </div>
    <script>
        // Persistent Credits
        const credits = localStorage.getItem('mogli_credits') || 150;
        document.getElementById('credit-count').innerText = credits;

        document.querySelectorAll('.sign-out-btn').forEach(btn => {
            btn.onclick = () => {
                window.location.href = 'index.html';
            };
        });
    </script>
</body>

</html>
